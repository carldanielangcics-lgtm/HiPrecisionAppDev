<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="Hi-Precision Diagnostics - Healthcare Management System" />
    <meta name="theme-color" content="#0D7C6B" />

    <!--
      Content Security Policy
      ─────────────────────────────────────────────────────────────────────
      • default-src 'self'          → only load resources from own origin by default
      • script-src  'self' + CDNs   → allow Bootstrap JS from jsdelivr; NO unsafe-eval
      • style-src   'self' + CDNs + 'unsafe-inline'  → Bootstrap/Tabler CSS + inline styles React needs
      • connect-src 'self' + Supabase REST + WSS → API calls and realtime channel
      • img-src     'self' data:    → base64 images
      • font-src    'self' + CDNs   → icon font from jsdelivr
      NOTE: unsafe-eval is intentionally omitted — Vite dev HMR is configured
      to use non-eval source maps so this is safe in both dev and production.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' https://cdn.jsdelivr.net;
      style-src   'self' https://cdn.jsdelivr.net 'unsafe-inline';
      connect-src 'self'
                  https://bzqndrqhxilexwisvyme.supabase.co
                  wss://bzqndrqhxilexwisvyme.supabase.co;
      img-src     'self' data: blob:;
      font-src    'self' https://cdn.jsdelivr.net;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    " />

    <title>Hi-Precision Diagnostics</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
